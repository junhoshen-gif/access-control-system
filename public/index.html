<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Files – FileAccess</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/protect.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-brand">
    <svg width="28" height="28" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="#2563EB"/><path d="M10 10h10l6 6v10H10V10z" fill="white" opacity="0.9"/><circle cx="23" cy="13" r="4" fill="#BFDBFE" stroke="#2563EB" stroke-width="1.5"/><path d="M21.5 13l1 1 2-2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>FileAccess</span>
  </div>
  <div class="nav-right">
    <span id="adminLink" class="nav-link hidden"><a href="admin.html">Admin Console</a></span>
    <span class="nav-link"><a href="status.html">Status</a></span>
    <div class="nav-user" id="navUser">
      <div class="avatar" id="userAvatar">?</div>
      <span id="userName">Loading…</span>
      <button class="btn btn-ghost btn-sm" id="signOutBtn">Sign out</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main-content">
  <div class="page-header">
    <h2>My Files</h2>
    <p class="text-muted" id="fileCount"></p>
  </div>

  <!-- Search / Filter -->
  <div class="toolbar">
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search files…" oninput="filterFiles()"/>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('doc', this)">Docs</button>
      <button class="filter-tab" onclick="setFilter('image', this)">Images</button>
      <button class="filter-tab" onclick="setFilter('media', this)">Media</button>
      <button class="filter-tab" onclick="setFilter('other', this)">Other</button>
    </div>
  </div>

  <!-- File Grid -->
  <div id="loadingState" class="empty-state">
    <div class="spinner"></div>
    <p>Loading your files…</p>
  </div>
  <div id="emptyState" class="empty-state hidden">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
    <p>No files available yet</p>
    <span class="text-muted">Contact an admin to get access to files.</span>
  </div>
  <div id="fileGrid" class="file-grid hidden"></div>

  <!-- STORE SECTION — available products the user hasn't bought yet -->
  <div id="storeSection" class="hidden" style="margin-top:2.5rem;">
    <div class="page-header" style="margin-bottom:1rem;">
      <h2>購買存取權 Buy Access</h2>
      <p class="text-muted">付款後系統將自動解鎖檔案，無需等待管理員審核。</p>
    </div>
    <div id="storeGrid" class="store-grid"></div>
  </div>

  <!-- Payment redirect notice -->
  <div id="paymentDoneNotice" class="hidden" style="margin-top:1rem;">
    <div class="alert alert-success">
      🎉 付款成功！系統正在更新您的存取權限，請稍候幾秒後重新整理頁面。
    </div>
  </div>
</main>

<!-- FILE VIEWER MODAL -->
<div id="viewerModal" class="modal hidden">
  <div class="modal-overlay" onclick="closeViewer()"></div>
  <div class="modal-panel">
    <div class="modal-header">
      <div>
        <h3 id="viewerTitle">File Name</h3>
        <span id="viewerMeta" class="text-muted text-sm"></span>
      </div>
      <button class="btn btn-ghost" onclick="closeViewer()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="viewerBody">
      <!-- Content rendered here by openViewer / openProductPreview -->
    </div>
  </div>
</div>

<!-- Viewer progress + protection styles (injected once, shared by both viewer functions) -->
<style>
  /* ── Modal viewer progress bar ─────────────────────────────────────────── */
  .mv-loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 1.5rem;
    padding: 2.5rem 2rem; min-height: 340px;
  }
  .mv-loading-icon { font-size: 2.5rem; line-height: 1; }
  .mv-loading-title { font-size: 0.95rem; font-weight: 600; color: var(--color-text); }
  .mv-steps { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 0.9rem; }

  .mv-step { display: flex; align-items: center; gap: 0.75rem; }
  .mv-step-icon {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid #CBD5E1;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 0.72rem; color: #94A3B8;
    transition: all 0.25s;
  }
  .mv-step-icon.mv-active  { border-color: #3B82F6; background: #EFF6FF; color: #2563EB; }
  .mv-step-icon.mv-done    { border-color: #22C55E; background: #F0FDF4; color: #16A34A; }
  .mv-step-icon.mv-err     { border-color: #EF4444; background: #FEF2F2; color: #EF4444; }
  .mv-step-spin {
    width: 12px; height: 12px;
    border: 2px solid rgba(37,99,235,.25); border-top-color: #2563EB;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  .mv-step-text { display: flex; flex-direction: column; gap: 0.1rem; }
  .mv-step-label  { font-size: 0.82rem; font-weight: 500; color: var(--color-text); }
  .mv-step-sub    { font-size: 0.72rem; color: var(--color-muted); min-height: 1em; }
  .mv-step.mv-pending .mv-step-label { color: var(--color-muted); }

  .mv-track { margin-left: 13px; width: 2px; height: 14px; background: #E2E8F0; border-radius: 2px; overflow: hidden; }
  .mv-track .mv-fill { width: 100%; height: 0%; background: #3B82F6; transition: height 0.35s ease; }
  .mv-track.mv-filled .mv-fill { height: 100%; }

  .mv-dl-bar { width: 100%; height: 3px; background: #E2E8F0; border-radius: 2px; overflow: hidden; margin-top: 0.25rem; display: none; }
  .mv-dl-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#2563EB,#3B82F6); border-radius: 2px; transition: width 0.18s ease; }

  /* error state inside modal */
  .mv-error {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.85rem; padding: 2rem; text-align: center;
  }
  .mv-error-title { font-size: 0.9rem; font-weight: 600; color: #EF4444; }
  .mv-error-detail {
    font-size: 0.78rem; color: var(--color-muted); background: #F8FAFC;
    padding: 0.65rem 0.9rem; border-radius: 6px; white-space: pre-wrap;
    text-align: left; width: 100%; max-width: 440px;
  }

  /* PDF pages inside modal */
  .mv-pdf-page { position: relative; margin-bottom: 0.75rem; line-height: 0; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.12); }
  .mv-pdf-page canvas { display: block; max-width: 100%; }
  .mv-pdf-wrap { display: flex; flex-direction: column; align-items: center; padding: 1rem; background: #F1F5F9; }
  .mv-wm { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .mv-preview-note { font-size: 0.8rem; color: var(--color-muted); text-align: center; padding: 0.5rem 0 0.25rem; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { firebaseConfig, dbGet, dbSet } from "./js/config.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app); // still needed for push() (logs)

  let allFiles = [];        // files the user has access to
  let allProducts = {};     // published products (for "Buy Access" section)
  let grantedFileIds = new Set(); // file IDs the user currently has access to
  let currentFilter = "all";
  let currentUserEmail = "";
  let currentUserObj = null;

  // ── ECPay server URL — update this after deploying to Render ──────────────
  // Replace with your actual Render URL e.g. https://fileaccess-ecpay.onrender.com
  const ECPAY_SERVER_URL = "https://fileaccess-ecpay.onrender.com";

  async function writeLog(action, details = {}) {
    if (!currentUserObj) return;
    try {
      await push(ref(db, "logs"), {
        action,
        uid:       currentUserObj.uid,
        email:     currentUserObj.email || "",
        name:      currentUserObj.displayName || currentUserObj.email || "",
        timestamp: Date.now(),
        ...details
      });
    } catch(e) { /* silently ignore log failures */ }
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }

    currentUserObj   = user;
    currentUserEmail = user.email || user.displayName || "unknown";
    document.getElementById("userName").textContent = user.displayName || user.email;
    document.getElementById("userAvatar").textContent = (user.displayName || user.email || "?")[0].toUpperCase();

    // Log login event (fire-and-forget — never block page load)
    writeLog("login");

    // Upsert user profile into users node so admin can see all users.
    // Always write on every login — it's idempotent and avoids a pre-read
    // that would 403 because regular users can't read the parent /users node
    // (only their own child), causing the catch to swallow the error before
    // dbSet is ever called.
    try {
      await dbSet(auth, `users/${user.uid}`, {
        email:       user.email       || "",
        displayName: user.displayName || "",
        createdAt:   Date.now()
      });
    } catch(e) { console.warn("User profile upsert failed:", e.message); }

    // Check admin via REST (Safari WebSocket-safe)
    try {
      const adminVal = await dbGet(auth, `admins/${user.uid}`);
      if (adminVal !== null) {
        document.getElementById("adminLink").classList.remove("hidden");
      }
    } catch (err) {
      console.warn("Admin check failed:", err.message);
    }

    // Load accessible files and products
    await loadFiles(user.uid);
    await loadProducts(user.uid);
  });

  document.getElementById("signOutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });

  async function loadFiles(uid) {
    try {
      // Use REST API — bypasses Safari WebSocket auth block completely.
      // Fetch the user's access grants first, then fetch only the specific file
      // metadata entries the user has access to (one request per file).
      // This is necessary because /files is now restricted to admins for bulk reads;
      // regular users can only read individual /files/$fileId entries they have a grant for.
      const accessData = await dbGet(auth, `access/${uid}`).then(v => v || {});

      document.getElementById("loadingState").classList.add("hidden");

      const now = Date.now();

      // Filter to valid (granted, non-expired) file IDs
      const validEntries = Object.entries(accessData).filter(([, access]) => {
        if (!access.granted) return false;
        if (access.expiresAt && access.expiresAt < now) return false;
        return true;
      });

      // Fetch each file's metadata in parallel (user can read /files/$fileId they have access to)
      const fileResults = await Promise.all(
        validEntries.map(([fileId]) =>
          dbGet(auth, `files/${fileId}`).then(data => ({ fileId, data })).catch(() => ({ fileId, data: null }))
        )
      );

      allFiles = fileResults
        .filter(({ data }) => data !== null)
        .map(({ fileId, data }) => ({
          id: fileId,
          ...data,
          expiresAt: accessData[fileId].expiresAt || null
        }));

      // Track which file IDs user has access to (for store filtering)
      grantedFileIds = new Set(allFiles.map(f => f.id));

      if (allFiles.length > 0) {
        document.getElementById("fileGrid").classList.remove("hidden");
        renderFiles();
      } else {
        document.getElementById("emptyState").classList.remove("hidden");
      }
    } catch (err) {
      console.error(err);
      document.getElementById("loadingState").innerHTML = `<p class="text-error">Failed to load files. Please refresh.</p>`;
    }
  }

  // ── Store: load products and show "Buy Access" for unpurchased ones ────────
  async function loadProducts(uid) {
    // Show payment done notice if redirected back from ECPay
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("payment") === "done") {
      document.getElementById("paymentDoneNotice").classList.remove("hidden");
      // Clean URL
      window.history.replaceState({}, "", window.location.pathname);
    }

    try {
      const val = await dbGet(auth, "products");
      if (!val) return;
      allProducts = val;
    } catch(e) { return; }

    // Filter to products that contain at least one file the user doesn't have
    const availableProducts = Object.entries(allProducts).filter(([, p]) => {
      if (!p.fileIds || p.fileIds.length === 0) return false;
      return p.fileIds.some(fid => !grantedFileIds.has(fid));
    });

    if (availableProducts.length === 0) return;

    document.getElementById("storeSection").classList.remove("hidden");
    const cards = availableProducts.map(([key, p]) => {
      const price      = p.price || (p.priceNTD ? `NT$${p.priceNTD}` : "");
      const method     = p.paymentMethod === "Credit" ? "💳 信用卡" : p.paymentMethod === "ATM" ? "🏧 ATM" : "💳 信用卡 / 🏧 ATM";
      const fileCount  = (p.fileIds || []).length;
      const hasImages  = Array.isArray(p.imageKeys) && p.imageKeys.length > 0;
      const hasPreview = p.previewFileId;

      // Image carousel placeholder — images loaded async after render
      const imageSection = hasImages
        ? `<div class="store-card-images" data-productkey="${escHtml(key)}" style="display:flex;gap:6px;overflow-x:auto;padding:0.5rem 0;min-height:80px;align-items:center;">
            ${p.imageKeys.map((k, i) =>
              `<img data-imgkey="${escHtml(k)}" alt="product image ${i+1}"
                style="height:72px;width:auto;border-radius:6px;object-fit:cover;border:1px solid var(--color-border);flex-shrink:0;" />`
            ).join("")}
           </div>`
        : `<div style="padding:0.75rem 0;text-align:center;color:var(--color-text-muted);font-size:2rem;">📦</div>`;

      const previewBtn = hasPreview
        ? `<button class="btn btn-ghost btn-sm" onclick="openProductPreview('${escHtml(key)}')">預覽 Preview</button>`
        : "";

      return `
        <div class="store-card">
          ${imageSection}
          <div class="store-card-body">
            <div class="store-info">
              <div class="store-name">${escHtml(p.name)}</div>
              <div class="store-meta">${fileCount} 個檔案 · ${method}</div>
              ${p.durationDays ? `<div class="store-meta">有效期限：${p.durationDays} 天</div>` : `<div class="store-meta">永久存取</div>`}
            </div>
          </div>
          <div class="store-card-footer">
            <span class="store-price">${escHtml(price)}</span>
            <div style="display:flex;gap:0.5rem;align-items:center;">
              ${previewBtn}
              <button class="btn btn-primary btn-sm" onclick="buyProduct('${key}', this)">立即購買</button>
            </div>
          </div>
        </div>`;
    }).join("");

    document.getElementById("storeGrid").innerHTML = cards;

    // Async: load signed URLs for all product images
    loadProductImages();
  }

  // ── Load signed URLs for product images ────────────────────────────────────
  async function loadProductImages() {
    const imgs = document.querySelectorAll(".store-card-images img[data-imgkey]");
    for (const img of imgs) {
      const key = img.dataset.imgkey;
      try {
        const resp = await fetch(`${ECPAY_SERVER_URL}/images/signed-url?key=${encodeURIComponent(key)}`);
        if (resp.ok) {
          const { signedUrl } = await resp.json();
          img.src = signedUrl;
        }
      } catch { /* non-fatal */ }
    }
  }

  // ── Shared modal viewer engine ──────────────────────────────────────────────
  // Renders any blob inside #viewerBody with the same step-progress UI as viewer.html.
  // Steps:  1=auth/link  2=download  3=render
  // Call mvStep*(n, msg) helpers to drive the UI, then mvRender*(blob, ...) to show content.

  const PDFJS_CDN    = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";
  const PDFJS_WORKER = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

  // Build the progress HTML for N steps inside viewerBody
  function mvBuildUI(body, icon, steps) {
    const stepsHtml = steps.map((label, i) => {
      const n = i + 1;
      const track = n < steps.length
        ? `<div class="mv-track" id="mv-track${n}"><div class="mv-fill"></div></div>` : "";
      return `
        <div class="mv-step mv-pending" id="mv-step${n}">
          <div class="mv-step-icon" id="mv-icon${n}">${n}</div>
          <div class="mv-step-text">
            <div class="mv-step-label">${escHtml(label)}</div>
            <div class="mv-step-sub" id="mv-sub${n}"></div>
            ${n === 2 ? `<div class="mv-dl-bar" id="mv-dlbar"><div class="mv-dl-bar-fill" id="mv-dlbarfill"></div></div>` : ""}
          </div>
        </div>${track}`;
    }).join("");
    body.innerHTML = `
      <div class="mv-loading">
        <div class="mv-loading-icon">${icon}</div>
        <div id="mv-steps" class="mv-steps">${stepsHtml}</div>
      </div>`;
  }

  function mvActive(n, sub) {
    const step = document.getElementById(`mv-step${n}`);
    const icon = document.getElementById(`mv-icon${n}`);
    const subEl = document.getElementById(`mv-sub${n}`);
    if (!step) return;
    step.classList.remove("mv-pending");
    icon.classList.add("mv-active");
    icon.innerHTML = `<div class="mv-step-spin"></div>`;
    if (sub != null && subEl) subEl.textContent = sub;
  }

  function mvDone(n, sub) {
    const step = document.getElementById(`mv-step${n}`);
    const icon = document.getElementById(`mv-icon${n}`);
    const subEl = document.getElementById(`mv-sub${n}`);
    const track = document.getElementById(`mv-track${n}`);
    if (!step) return;
    step.classList.remove("mv-pending");
    icon.classList.remove("mv-active");
    icon.classList.add("mv-done");
    icon.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
    if (sub != null && subEl) subEl.textContent = sub;
    if (track) track.classList.add("mv-filled");
  }

  function mvErr(n, sub) {
    const icon = document.getElementById(`mv-icon${n}`);
    const subEl = document.getElementById(`mv-sub${n}`);
    if (!icon) return;
    icon.classList.remove("mv-active");
    icon.classList.add("mv-err");
    icon.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    if (sub != null && subEl) subEl.textContent = sub;
  }

  function mvSetDlProgress(pct) {
    const bar  = document.getElementById("mv-dlbar");
    const fill = document.getElementById("mv-dlbarfill");
    if (!bar || !fill) return;
    bar.style.display = "block";
    fill.style.width  = `${Math.min(100, pct)}%`;
  }

  function mvSetSub(n, msg) {
    const el = document.getElementById(`mv-sub${n}`);
    if (el) el.textContent = msg;
  }

  function mvShowError(body, msg) {
    body.innerHTML = `
      <div class="mv-error">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div class="mv-error-title">Failed to load</div>
        <pre class="mv-error-detail">${escHtml(msg)}</pre>
      </div>`;
  }

  // Fetch blob with streaming progress (step 2)
  // Uses a 60-second AbortController timeout to surface errors instead of hanging.
  async function mvFetchBlob(url) {
    const controller = new AbortController();
    const timeoutId  = setTimeout(() => controller.abort(), 60_000);

    let resp;
    try {
      resp = await fetch(url, { signal: controller.signal });
    } catch (err) {
      clearTimeout(timeoutId);
      if (err.name === "AbortError") throw new Error("Download timed out. Please try again.");
      throw err;
    }

    if (!resp.ok) {
      clearTimeout(timeoutId);
      throw new Error(`Storage error ${resp.status}`);
    }

    const contentLength = Number(resp.headers.get("Content-Length") || 0);

    try {
      if (contentLength > 0 && resp.body) {
        // Stream with progress tracking
        const reader = resp.body.getReader();
        const chunks = [];
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          mvSetDlProgress((received / contentLength) * 100);
          mvSetSub(2, `${mvFmtBytes(received)} / ${mvFmtBytes(contentLength)}`);
        }
        const all = new Uint8Array(received);
        let off = 0;
        for (const c of chunks) { all.set(c, off); off += c.length; }
        return new Blob([all]);
      } else {
        // No Content-Length — animate indeterminate bar and use blob()
        let pct = 0;
        const t = setInterval(() => { pct = Math.min(88, pct + 2); mvSetDlProgress(pct); }, 150);
        const blob = await resp.blob();
        clearInterval(t);
        return blob;
      }
    } finally {
      clearTimeout(timeoutId);
    }
  }

  function mvFmtBytes(b) {
    if (b < 1024) return `${b} B`;
    if (b < 1048576) return `${(b/1024).toFixed(1)} KB`;
    return `${(b/1048576).toFixed(1)} MB`;
  }

  // Render content into a target container div
  async function mvRenderContent(container, blob, fileType, fileName, watermarkEmail, pageLimit) {
    const type = fileType || blob.type;

    if (type === "application/pdf") {
      await mvRenderPdf(container, blob, watermarkEmail, pageLimit);
    } else if (type.startsWith("image/")) {
      mvRenderImage(container, blob, watermarkEmail);
    } else if (type.startsWith("video/")) {
      mvRenderVideo(container, blob);
    } else if (type.startsWith("audio/")) {
      mvRenderAudio(container, blob, fileName);
    } else if (type.startsWith("text/")) {
      await mvRenderText(container, blob);
    } else {
      throw new Error(`Cannot preview this file type: ${type || "unknown"}`);
    }
  }

  async function mvRenderPdf(container, blob, email, pageLimit) {
    let pdfjsLib;
    try {
      pdfjsLib = await import(PDFJS_CDN);
      pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
    } catch (e) { throw new Error(`PDF engine failed to load: ${e.message}`); }

    const arrayBuffer = await blob.arrayBuffer();
    let pdf;
    try { pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise; }
    catch (e) { throw new Error(`Could not parse PDF: ${e.message}`); }

    const total = pageLimit ? Math.min(pdf.numPages, pageLimit) : pdf.numPages;

    const wrap = document.createElement("div");
    wrap.className = "mv-pdf-wrap";

    if (pageLimit && pdf.numPages > pageLimit) {
      const note = document.createElement("p");
      note.className = "mv-preview-note";
      note.textContent = `Preview: first ${pageLimit} of ${pdf.numPages} pages · Purchase to read all`;
      wrap.appendChild(note);
    }

    container.appendChild(wrap);

    for (let i = 1; i <= total; i++) {
      mvSetSub(3, `Rendering page ${i} / ${total}…`);
      const page     = await pdf.getPage(i);
      const scale    = Math.min(1.5, (container.clientWidth - 32) / page.getViewport({ scale: 1 }).width);
      const viewport = page.getViewport({ scale: scale > 0 ? scale : 1.5 });

      const pageDiv = document.createElement("div");
      pageDiv.className = "mv-pdf-page";
      const canvas = document.createElement("canvas");
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      pageDiv.appendChild(canvas);
      wrap.appendChild(pageDiv);

      await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;

      if (email) {
        const wm = document.createElement("canvas");
        wm.className = "mv-wm";
        wm.width  = canvas.width;
        wm.height = canvas.height;
        wm.style.opacity = "0.12";
        const ctx = wm.getContext("2d");
        ctx.font = "bold 13px Inter,system-ui,sans-serif";
        ctx.fillStyle = "#000";
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(-30 * Math.PI / 180);
        ctx.translate(-canvas.width/2, -canvas.height/2);
        const stepX = 240, stepY = 100;
        for (let y = -canvas.height; y < canvas.width + canvas.height; y += stepY)
          for (let x = -canvas.width; x < canvas.width + canvas.height; x += stepX)
            ctx.fillText(`🔒 ${email}`, x, y);
        ctx.restore();
        pageDiv.appendChild(wm);
      }
    }
  }

  function mvRenderImage(container, blob, email) {
    const url  = URL.createObjectURL(blob);
    const wrap = document.createElement("div");
    wrap.className = "image-viewer";
    wrap.style.position = "relative";
    const img = document.createElement("img");
    img.src      = url;
    img.draggable = false;
    img.style.pointerEvents = "none";
    img.onload = () => {
      if (email) {
        const wm = document.createElement("canvas");
        wm.style.cssText = "position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;opacity:0.12;";
        wrap.appendChild(wm);
        requestAnimationFrame(() => {
          wm.width  = wrap.offsetWidth  || 800;
          wm.height = wrap.offsetHeight || 600;
          const ctx = wm.getContext("2d");
          ctx.font = "bold 13px Inter,system-ui,sans-serif";
          ctx.fillStyle = "#000";
          ctx.save();
          ctx.translate(wm.width/2, wm.height/2);
          ctx.rotate(-30 * Math.PI / 180);
          ctx.translate(-wm.width/2, -wm.height/2);
          for (let y = -wm.height; y < wm.width + wm.height; y += 100)
            for (let x = -wm.width; x < wm.width + wm.height; x += 240)
              ctx.fillText(`🔒 ${email}`, x, y);
          ctx.restore();
        });
      }
      URL.revokeObjectURL(url);
    };
    wrap.appendChild(img);
    container.appendChild(wrap);
  }

  function mvRenderVideo(container, blob) {
    const url   = URL.createObjectURL(blob);
    const wrap  = document.createElement("div");
    wrap.className = "media-viewer";
    const video = document.createElement("video");
    video.src                    = url;
    video.controls               = true;
    video.controlsList           = "nodownload nofullscreen";
    video.disablePictureInPicture = true;
    video.onended = () => URL.revokeObjectURL(url);
    wrap.appendChild(video);
    container.appendChild(wrap);
  }

  function mvRenderAudio(container, blob, name) {
    const url  = URL.createObjectURL(blob);
    const wrap = document.createElement("div");
    wrap.className = "media-viewer audio-viewer";
    wrap.innerHTML = `<div style="font-size:3.5rem">🎵</div><p style="margin:1rem 0 1.5rem;font-weight:500">${escHtml(name)}</p>`;
    const audio = document.createElement("audio");
    audio.src          = url;
    audio.controls     = true;
    audio.controlsList = "nodownload";
    audio.onended      = () => URL.revokeObjectURL(url);
    wrap.appendChild(audio);
    container.appendChild(wrap);
  }

  async function mvRenderText(container, blob) {
    const text = await blob.text();
    const wrap = document.createElement("div");
    wrap.className = "text-viewer";
    const pre = document.createElement("pre");
    pre.textContent = text;
    wrap.appendChild(pre);
    container.appendChild(wrap);
  }

  // ── Product preview modal ───────────────────────────────────────────────────
  window.openProductPreview = async (productKey) => {
    const p = allProducts[productKey];
    if (!p?.previewFileId) return;

    const modal = document.getElementById("viewerModal");
    const body  = document.getElementById("viewerBody");

    document.getElementById("viewerTitle").textContent = `預覽：${p.name}`;
    document.getElementById("viewerMeta").textContent  = "";
    modal.classList.remove("hidden");
    document.body.style.overflow = "hidden";

    const icon = "📄";
    mvBuildUI(body, icon, ["Fetching preview link", "Downloading", "Rendering"]);
    mvActive(1, "Contacting server…");

    // Step 1 — fetch metadata / secure link
    let meta, pageLimit, fileType;
    try {
      const metaUrl  = `${ECPAY_SERVER_URL}/files/preview-url?fileId=${encodeURIComponent(p.previewFileId)}`;
      const metaResp = await fetch(metaUrl);
      if (!metaResp.ok) throw new Error("無法取得預覽連結");
      meta      = await metaResp.json();
      fileType  = meta.fileType;
      pageLimit = p.previewPages ? parseInt(p.previewPages, 10) : meta.pageLimit;
      mvDone(1, "Link received");
    } catch (err) {
      mvErr(1, err.message);
      mvShowError(body, err.message);
      return;
    }

    // Step 2 — download
    mvActive(2, "Connecting…");
    let blob;
    try {
      if (fileType === "application/pdf" && pageLimit) {
        // For PDFs with a page limit: ask the server to trim to N pages.
        // The server downloads from S3, extracts pages, and returns a small PDF —
        // so the client only receives the previewable pages, not the full file.
        const previewUrl = `${ECPAY_SERVER_URL}/files/preview-pdf?fileId=${encodeURIComponent(p.previewFileId)}&pages=${pageLimit}`;
        blob = await mvFetchBlob(previewUrl);
      } else {
        // For non-PDFs (images, audio, video, text) or PDFs without a page limit,
        // download the full file via the original signed URL.
        blob = await mvFetchBlob(meta.signedUrl);
      }
      mvSetDlProgress(100);
      mvDone(2, `${mvFmtBytes(blob.size)} downloaded`);
    } catch (err) {
      mvErr(2, err.message);
      mvShowError(body, err.message);
      return;
    }

    mvActive(3, "Preparing…");
    // Clear loading UI and replace with content container
    body.innerHTML = "";
    const contentDiv = document.createElement("div");
    contentDiv.style.cssText = "width:100%;min-height:300px;overflow:auto;";
    body.appendChild(contentDiv);

    try {
      // Re-show a minimal step 3 indicator while rendering
      body.insertAdjacentHTML("afterbegin", `<div id="mv-render-note" style="font-size:0.78rem;color:var(--color-muted);text-align:center;padding:0.4rem 0;"><span id="mv-sub3">Rendering…</span></div>`);
      await mvRenderContent(contentDiv, blob, fileType, p.name || "", "", pageLimit);
      document.getElementById("mv-render-note")?.remove();
    } catch (err) {
      mvShowError(body, err.message);
    }
  };

  window.buyProduct = async (productKey, btn) => {
    if (!ECPAY_SERVER_URL) {
      alert("付款伺服器尚未設定。請聯絡管理員。");
      return;
    }
    if (!currentUserObj) {
      alert("請先登入再購買。");
      return;
    }
    btn.disabled = true;
    btn.textContent = "跳轉中…";

    try {
      // Get a fresh Firebase ID Token — server will verify it to get the uid
      const idToken = await currentUserObj.getIdToken(/* forceRefresh */ true);

      const resp = await fetch(`${ECPAY_SERVER_URL}/ecpay/create-order`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productKey, idToken })
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        throw new Error(err.error || resp.statusText);
      }
      const { ecpayUrl, params } = await resp.json();

      // Build and auto-submit the ECPay form entirely in the browser
      const form = document.createElement("form");
      form.method = "POST";
      form.action = ecpayUrl;
      form.style.display = "none";
      for (const [k, v] of Object.entries(params)) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = k;
        input.value = v;
        form.appendChild(input);
      }
      document.body.appendChild(form);
      form.submit();
    } catch(err) {
      btn.disabled = false;
      btn.textContent = "立即購買";
      alert("無法建立訂單，請稍後再試。\n" + err.message);
    }
  };

  window.filterFiles = filterFiles;
  window.setFilter = setFilter;
  window.openViewer = openViewer;
  window.closeViewer = closeViewer;

  function setFilter(type, el) {
    currentFilter = type;
    document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    filterFiles();
  }

  function filterFiles() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    renderFiles(q);
  }

  // File type definitions (mirrors admin.html)
  const FILE_TYPES = {
    "application/pdf":   { label:"PDF",  icon:"📄", viewer:"pdf"      },
    "image/png":         { label:"PNG",  icon:"🖼️", viewer:"image"    },
    "image/jpeg":        { label:"JPEG", icon:"🖼️", viewer:"image"    },
    "image/gif":         { label:"GIF",  icon:"🖼️", viewer:"image"    },
    "image/webp":        { label:"WEBP", icon:"🖼️", viewer:"image"    },
    "image/svg+xml":     { label:"SVG",  icon:"🎨", viewer:"image"    },
    "text/html":         { label:"HTML", icon:"🌐", viewer:"html"     },
    "text/plain":        { label:"TXT",  icon:"📝", viewer:"text"     },
    "text/markdown":     { label:"MD",   icon:"📝", viewer:"text"     },
    "text/csv":          { label:"CSV",  icon:"📊", viewer:"text"     },
    "video/mp4":         { label:"MP4",  icon:"🎬", viewer:"video"    },
    "video/webm":        { label:"WEBM", icon:"🎬", viewer:"video"    },
    "audio/mpeg":        { label:"MP3",  icon:"🎵", viewer:"audio"    },
    "audio/wav":         { label:"WAV",  icon:"🎵", viewer:"audio"    },
    "model/stl":         { label:"STL",  icon:"🧊", viewer:"download" },
  };

  function getTypeDef(type, name) {
    if (FILE_TYPES[type]) return FILE_TYPES[type];
    const ext = name?.split(".").pop()?.toLowerCase();
    if (ext === "stl" || ext === "obj") return { label: ext.toUpperCase(), icon:"🧊", viewer:"download" };
    if (ext === "md")  return { label:"MD",   icon:"📝", viewer:"text" };
    if (ext === "htm") return { label:"HTML",  icon:"🌐", viewer:"html" };
    if (ext === "docx") return { label:"DOCX", icon:"📘", viewer:"download" };
    if (ext === "xlsx") return { label:"XLSX", icon:"📗", viewer:"download" };
    if (ext === "zip" || ext === "rar") return { label: ext.toUpperCase(), icon:"🗜️", viewer:"download" };
    return { label: (ext || "FILE").toUpperCase(), icon:"📁", viewer:"download" };
  }

  function getFilterCategory(f) {
    const def = getTypeDef(f.type, f.name);
    if (def.viewer === "pdf" || def.viewer === "text" || f.type?.includes("document")) return "doc";
    if (def.viewer === "image") return "image";
    if (def.viewer === "video" || def.viewer === "audio") return "media";
    return "other";
  }

  function renderFiles(q = "") {
    const filtered = allFiles.filter(f => {
      const matchSearch = f.name.toLowerCase().includes(q);
      const cat = getFilterCategory(f);
      const matchFilter =
        currentFilter === "all" ||
        currentFilter === cat;
      return matchSearch && matchFilter;
    });

    document.getElementById("fileCount").textContent =
      `${filtered.length} file${filtered.length !== 1 ? "s" : ""}`;

    const grid = document.getElementById("fileGrid");
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="no-results">No files match your search.</div>`;
      return;
    }

    grid.innerHTML = filtered.map(f => {
      const def    = getTypeDef(f.type, f.name);
      const expiry = f.expiresAt
        ? `<span class="badge badge-warning">Expires ${formatDate(f.expiresAt)}</span>`
        : `<span class="badge badge-success">Permanent</span>`;
      // Use data-* attributes instead of inline onclick to avoid URL-injection XSS
      return `
        <div class="file-card" data-fileid="${escHtml(f.id)}" style="cursor:pointer;">
          <div class="file-icon" style="font-size:2rem;line-height:1">${def.icon}</div>
          <div class="file-info">
            <div class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</div>
            <div class="file-meta">
              <span class="badge badge-neutral">${def.label}</span>
              ${expiry}
            </div>
          </div>
        </div>`;
    }).join("");
  }

  async function openViewer(fileId, name, type) {
    document.getElementById("viewerTitle").textContent = name;
    const file = allFiles.find(f => f.id === fileId);
    document.getElementById("viewerMeta").textContent =
      file?.expiresAt ? `Access expires ${formatDate(file.expiresAt)}` : "";

    const body = document.getElementById("viewerBody");
    document.getElementById("viewerModal").classList.remove("hidden");
    document.body.style.overflow = "hidden";

    // Determine icon from type
    function viewerIcon(t, n) {
      if (t === "application/pdf")  return "📄";
      if (t?.startsWith("image/")) return "🖼️";
      if (t?.startsWith("video/")) return "🎬";
      if (t?.startsWith("audio/")) return "🎵";
      if (t?.startsWith("text/"))  return "📝";
      return "📁";
    }
    mvBuildUI(body, viewerIcon(type, name), ["Fetching secure link", "Downloading", "Rendering"]);

    // Step 1 — get signed URL
    mvActive(1, "Contacting server…");
    let signedUrl;
    try {
      const idToken = await currentUserObj.getIdToken();
      const resp = await fetch(
        `${ECPAY_SERVER_URL}/files/signed-url?fileId=${encodeURIComponent(fileId)}`,
        { headers: { "Authorization": `Bearer ${idToken}` } }
      );
      if (!resp.ok) throw new Error((await resp.json().catch(()=>({}))).error || resp.statusText);
      ({ signedUrl } = await resp.json());
      mvDone(1, "Secure link received");
    } catch (err) {
      mvErr(1, err.message);
      mvShowError(body, `無法載入檔案：${err.message}`);
      return;
    }

    // Log (fire-and-forget)
    writeLog("file_view", { fileName: name, fileId });

    const def = getTypeDef(type, name);

    // Non-previewable types — show a "contact admin" message (no download link)
    if (def.viewer === "download") {
      body.innerHTML = `
        <div class="image-viewer" style="flex-direction:column;gap:1rem;min-height:260px;">
          <div style="font-size:3.5rem">${def.icon}</div>
          <p style="font-weight:500;font-size:1rem">${escHtml(name)}</p>
          <p style="color:var(--color-muted);font-size:0.85rem;">This file type cannot be previewed in-browser.<br>Contact an admin to access this file.</p>
        </div>`;
      return;
    }

    // Step 2 — download blob with progress
    mvActive(2, "Connecting…");
    let blob;
    try {
      blob = await mvFetchBlob(signedUrl);
      mvSetDlProgress(100);
      mvDone(2, `${mvFmtBytes(blob.size)} downloaded`);
    } catch (err) {
      mvErr(2, err.message);
      mvShowError(body, err.message);
      return;
    }

    // Step 3 — render
    mvActive(3, "Preparing…");
    body.innerHTML = "";
    const contentDiv = document.createElement("div");
    contentDiv.style.cssText = "width:100%;min-height:300px;overflow:auto;";
    body.appendChild(contentDiv);

    // Thin rendering status bar
    body.insertAdjacentHTML("afterbegin", `<div id="mv-render-note" style="font-size:0.78rem;color:var(--color-muted);text-align:center;padding:0.35rem 0;"><span id="mv-sub3">Rendering…</span></div>`);

    try {
      const fileType = type || blob.type;
      await mvRenderContent(contentDiv, blob, fileType, name, currentUserEmail, null);
      document.getElementById("mv-render-note")?.remove();
    } catch (err) {
      mvShowError(body, err.message);
    }
  }

  function closeViewer() {
    document.getElementById("viewerModal").classList.add("hidden");
    document.getElementById("viewerBody").innerHTML = "";
    document.body.style.overflow = "";
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function escHtml(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // Delegated click handler for file cards — opens full-page viewer
  document.getElementById("fileGrid").addEventListener("click", (e) => {
    const card = e.target.closest(".file-card[data-fileid]");
    if (!card) return;
    const fileId = card.dataset.fileid;
    const f = allFiles.find(f => f.id === fileId);
    if (!f) return;
    const permanent = !f.expiresAt;
    const url = `viewer.html?fileId=${encodeURIComponent(f.id)}&name=${encodeURIComponent(f.name)}&type=${encodeURIComponent(f.type || "")}${permanent ? "&permanent=1" : ""}`;
    window.location.href = url;
  });

  // Close modal on Escape
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeViewer(); });
</script>
</body>
