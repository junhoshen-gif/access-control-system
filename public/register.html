<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account – FileAccess</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/protect.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="8" fill="#2563EB"/>
        <path d="M10 10h10l6 6v10H10V10z" fill="white" opacity="0.9"/>
        <rect x="14" y="18" width="8" height="1.5" rx="0.75" fill="#2563EB"/>
        <rect x="14" y="21" width="6" height="1.5" rx="0.75" fill="#2563EB"/>
        <circle cx="23" cy="13" r="4" fill="#BFDBFE" stroke="#2563EB" stroke-width="1.5"/>
        <path d="M21.5 13l1 1 2-2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="auth-logo-text">FileAccess</span>
    </div>

    <h1 class="auth-title">Create an account</h1>
    <p class="auth-subtitle">Sign up to get started</p>

    <div id="authError" class="alert alert-error hidden"></div>
    <div id="authSuccess" class="alert alert-success hidden"></div>

    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label for="displayName">Full Name</label>
        <input type="text" id="displayName" placeholder="Jane Smith" required autocomplete="name"/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password"/>
          <button type="button" class="pw-toggle" onclick="togglePw()">Show</button>
        </div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
        <span class="btn-label">Create Account</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>

    <div class="divider"><span>or sign up with</span></div>

    <div class="social-grid">
      <button class="btn btn-social btn-full" onclick="signInGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18"/>
        Continue with Google
      </button>
    </div>

    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      updateProfile,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult,
      browserLocalPersistence,
      setPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, initializeDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { firebaseConfig, rtdbOptions } from "./js/config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeDatabase(app, firebaseConfig.databaseURL, rtdbOptions);

    // Force local persistence — critical for Safari ITP compatibility
    await setPersistence(auth, browserLocalPersistence);

    function showError(msg) {
      const el = document.getElementById("authError");
      el.textContent = msg;
      el.classList.remove("hidden");
      document.getElementById("authSuccess").classList.add("hidden");
    }
    function showSuccess(msg) {
      const el = document.getElementById("authSuccess");
      el.textContent = msg;
      el.classList.remove("hidden");
      document.getElementById("authError").classList.add("hidden");
    }

    async function saveUserProfile(user, displayName) {
      await set(ref(db, `users/${user.uid}`), {
        email: user.email,
        displayName: displayName || user.displayName || "",
        createdAt: Date.now()
      });
    }

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("displayName").value.trim();
      const email = document.getElementById("email").value;
      const pw = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (pw !== confirm) { showError("Passwords do not match."); return; }

      const btn = document.getElementById("registerBtn");
      btn.disabled = true;
      btn.querySelector(".btn-label").classList.add("hidden");
      btn.querySelector(".btn-spinner").classList.remove("hidden");

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(cred.user, { displayName: name });
        await saveUserProfile(cred.user, name);
        window.location.href = "index.html";
      } catch (err) {
        showError(friendlyError(err.code));
        btn.disabled = false;
        btn.querySelector(".btn-label").classList.remove("hidden");
        btn.querySelector(".btn-spinner").classList.add("hidden");
      }
    });

    // Handle Google redirect result (Safari redirect flow) — must be after helpers defined
    (async () => {
      try {
        const result = await getRedirectResult(auth);
        if (result?.user) {
          await saveUserProfile(result.user, result.user.displayName);
          window.location.href = "index.html";
        }
      } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") showError(friendlyError(err.code));
      }
    })();

    // Google sign-in — popup first, redirect fallback for Safari
    window.signInGoogle = async () => {
      const provider = new GoogleAuthProvider();
      try {
        const cred = await signInWithPopup(auth, provider);
        await saveUserProfile(cred.user, cred.user.displayName);
        window.location.href = "index.html";
      } catch (err) {
        if (err.code === "auth/popup-blocked" ||
            err.code === "auth/popup-closed-by-user" ||
            err.code === "auth/cancelled-popup-request") {
          try { await signInWithRedirect(auth, provider); }
          catch (e) { showError(friendlyError(e.code)); }
        } else {
          showError(friendlyError(err.code));
        }
      }
    };

    window.togglePw = () => {
      const pw = document.getElementById("password");
      const btn = document.querySelector(".pw-toggle");
      if (pw.type === "password") { pw.type = "text"; btn.textContent = "Hide"; }
      else { pw.type = "password"; btn.textContent = "Show"; }
    };

    function friendlyError(code) {
      const map = {
        "auth/email-already-in-use": "An account with this email already exists.",
        "auth/invalid-email": "Please enter a valid email address.",
        "auth/weak-password": "Password must be at least 6 characters.",
      };
      return map[code] || "Registration failed. Please try again.";
    }
  </script>
</body>
</html>
