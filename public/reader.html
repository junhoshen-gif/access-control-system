<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reader – FileAccess</title>
  <script src="js/protect.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- epub.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

  <style>
    /* ── CSS Variables (light + dark) ── */
    :root {
      --bg:           #F8FAFC;
      --surface:      #FFFFFF;
      --border:       #E2E8F0;
      --text:         #0F172A;
      --muted:        #64748B;
      --primary:      #2563EB;
      --primary-h:    #1D4ED8;
      --bar-bg:       #1E293B;
      --bar-text:     #F8FAFC;
      --bar-muted:    #94A3B8;
      --bar-btn-bg:   rgba(255,255,255,0.08);
      --bar-btn-ho:   rgba(255,255,255,0.16);
      --shadow:       0 4px 24px rgba(0,0,0,0.12);
      --radius:       8px;
      --sidebar-w:    260px;
    }
    [data-theme="dark"] {
      --bg:           #0F172A;
      --surface:      #1E293B;
      --border:       #334155;
      --text:         #F1F5F9;
      --muted:        #94A3B8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: "Inter", system-ui, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    #topBar {
      height: 52px;
      background: var(--bar-bg);
      color: var(--bar-text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1rem;
      flex-shrink: 0;
      z-index: 100;
      user-select: none;
    }

    #topBar .bar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--bar-text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    #topBar .bar-brand svg { flex-shrink: 0; }

    #topBar .bar-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.15);
      margin: 0 0.25rem;
      flex-shrink: 0;
    }

    #fileTitle {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--bar-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .bar-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.35rem 0.65rem;
      border: none;
      border-radius: 6px;
      background: var(--bar-btn-bg);
      color: var(--bar-text);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .bar-btn:hover { background: var(--bar-btn-ho); }
    .bar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bar-btn.icon-only { padding: 0.35rem 0.45rem; }

    #pageInfo {
      font-size: 0.82rem;
      color: var(--bar-muted);
      min-width: 80px;
      text-align: center;
      flex-shrink: 0;
    }

    #zoomDisplay {
      font-size: 0.82rem;
      color: var(--bar-muted);
      min-width: 44px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Body layout ── */
    #readerBody {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.2s ease, opacity 0.2s ease;
    }
    #sidebar.collapsed {
      width: 0;
      opacity: 0;
      border: none;
    }

    #sidebarHeader {
      padding: 0.85rem 1rem 0.6rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      flex-shrink: 0;
    }

    #tocList {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #tocList:empty::after {
      content: "No chapters found.";
      display: block;
      padding: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .toc-item {
      display: block;
      width: 100%;
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
      line-height: 1.4;
      transition: background 0.1s;
    }
    .toc-item:hover { background: var(--bg); }
    .toc-item.active {
      background: #EFF6FF;
      color: var(--primary);
      font-weight: 500;
    }
    [data-theme="dark"] .toc-item.active {
      background: rgba(37,99,235,0.18);
    }
    .toc-item.sub { padding-left: 1.75rem; font-size: 0.82rem; }
    .toc-item.sub2 { padding-left: 2.5rem; font-size: 0.8rem; color: var(--muted); }

    /* ── Main viewer area ── */
    #viewerArea {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
    }

    /* ── PDF canvas container ── */
    #pdfContainer {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 1rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #pdfContainer.hidden { display: none; }

    .pdf-page-wrap {
      position: relative;
      box-shadow: var(--shadow);
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
      flex-shrink: 0;
    }

    .pdf-page-wrap canvas {
      display: block;
      max-width: 100%;
    }

    /* ── EPUB viewer ── */
    #epubContainer {
      flex: 1;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    #epubContainer.hidden { display: none; }

    /* epub.js renders into an iframe; we need it to fill the area */
    #epubContainer > div {
      height: 100% !important;
    }

    /* epub.js navigation arrows */
    .epub-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 44px;
      height: 64px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      box-shadow: var(--shadow);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .epub-nav-btn:hover { background: var(--bg); color: var(--text); }
    #epubPrev { left: 1rem; }
    #epubNext { right: 1rem; }

    /* ── Loading / Error states ── */
    #loadingState {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      z-index: 50;
      background: var(--bg);
    }
    #loadingState.hidden { display: none; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress bar (thin strip at top of viewer area) ── */
    #progressBar {
      height: 3px;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
      flex-shrink: 0;
      align-self: flex-start;
    }

    /* ── Keyboard hint (bottom-center) ── */
    #kbHint {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      z-index: 30;
    }
    #kbHint.visible { opacity: 1; }

    /* ── Disable all selection in reader content ── */
    #pdfContainer, #epubContainer {
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Scrollbar styling ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Back link ── */
    #backBtn {
      text-decoration: none;
      color: var(--bar-text);
    }
    #backBtn:hover { color: #fff; }
  </style>
</head>
<body>

<!-- ── Top Bar ── -->
<div id="topBar">
  <!-- Back button -->
  <a href="index.html" id="backBtn" class="bar-btn icon-only" title="Back to files">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
    </svg>
  </a>

  <!-- Brand -->
  <a href="index.html" class="bar-brand">
    <svg width="22" height="22" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="#2563EB"/><path d="M10 10h10l6 6v10H10V10z" fill="white" opacity="0.9"/><circle cx="23" cy="13" r="4" fill="#BFDBFE" stroke="#2563EB" stroke-width="1.5"/><path d="M21.5 13l1 1 2-2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    FileAccess
  </a>

  <div class="bar-divider"></div>

  <!-- File title -->
  <span id="fileTitle">Loading…</span>

  <div style="flex:1"></div>

  <!-- PDF controls (shown for PDFs) -->
  <div id="pdfControls" style="display:flex;align-items:center;gap:0.4rem;">
    <button class="bar-btn" id="zoomOut" title="Zoom out">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span id="zoomDisplay">100%</span>
    <button class="bar-btn" id="zoomIn" title="Zoom in">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <div class="bar-divider"></div>
    <button class="bar-btn" id="prevPage" title="Previous page (←)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span id="pageInfo">— / —</span>
    <button class="bar-btn" id="nextPage" title="Next page (→)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- EPUB controls (shown for EPUBs) -->
  <div id="epubControls" style="display:flex;align-items:center;gap:0.4rem;">
    <button class="bar-btn" id="epubTocToggle" title="Toggle chapters">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Chapters
    </button>
  </div>

  <div class="bar-divider"></div>

  <!-- Dark mode toggle -->
  <button class="bar-btn icon-only" id="darkModeBtn" title="Toggle dark mode">
    <svg id="darkIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="lightIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<!-- ── Reader Body ── -->
<div id="readerBody">

  <!-- Sidebar (chapters / TOC) -->
  <aside id="sidebar" class="collapsed">
    <div id="sidebarHeader">Chapters</div>
    <div id="tocList"></div>
  </aside>

  <!-- Main viewer area -->
  <div id="viewerArea">
    <!-- Progress strip -->
    <div id="progressBar"></div>

    <!-- Loading overlay -->
    <div id="loadingState">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>

    <!-- PDF canvas output -->
    <div id="pdfContainer" class="hidden"></div>

    <!-- EPUB viewer -->
    <div id="epubContainer" class="hidden">
      <button class="epub-nav-btn" id="epubPrev" title="Previous page (←)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="epub-nav-btn" id="epubNext" title="Next page (→)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- Keyboard hint bubble -->
    <div id="kbHint">← → to navigate &nbsp;·&nbsp; +/- to zoom</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { firebaseConfig } from "./js/config.js";

  // ── Constants ──────────────────────────────────────────────────────────────
  const ECPAY_SERVER_URL = "https://fileaccess-ecpay.onrender.com";

  // Ping the server immediately so Render starts waking up before auth finishes
  fetch(`${ECPAY_SERVER_URL}/`, { mode: "no-cors" }).catch(() => {});
  const ZOOM_STEP  = 0.15;
  const ZOOM_MIN   = 0.4;
  const ZOOM_MAX   = 3.0;
  const PROGRESS_KEY = (id) => `reader_progress_${id}`;

  // ── State ──────────────────────────────────────────────────────────────────
  let currentUser  = null;
  let fileId       = null;
  let fileName     = null;
  let fileType     = null;
  let signedUrl    = null;
  let readerMode   = null; // "pdf" | "epub"

  // PDF state
  let pdfDoc       = null;
  let pdfPage      = 1;
  let pdfTotal     = 0;
  let pdfZoom      = 1.0;
  let pdfRendering = false;
  let renderQueue  = null;  // pending page number

  // EPUB state
  let epubBook     = null;
  let epubRendition = null;
  let tocItems     = [];
  let activeTocIdx = -1;

  // Dark mode
  let darkMode = (localStorage.getItem("reader_dark") === "1");

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const elLoading      = document.getElementById("loadingState");
  const elPdfContainer = document.getElementById("pdfContainer");
  const elEpubContainer= document.getElementById("epubContainer");
  const elPdfControls  = document.getElementById("pdfControls");
  const elEpubControls = document.getElementById("epubControls");
  const elPageInfo     = document.getElementById("pageInfo");
  const elZoomDisplay  = document.getElementById("zoomDisplay");
  const elProgress     = document.getElementById("progressBar");
  const elFileTitle    = document.getElementById("fileTitle");
  const elSidebar      = document.getElementById("sidebar");
  const elTocList      = document.getElementById("tocList");
  const elKbHint       = document.getElementById("kbHint");

  // ── Parse URL params ───────────────────────────────────────────────────────
  function parseParams() {
    const p = new URLSearchParams(window.location.search);
    fileId   = p.get("fileId");
    fileName = p.get("name") || "";
    fileType = p.get("type") || "";
    if (!fileId) {
      showError("No file specified. <a href='index.html'>Go back</a>");
    }
  }

  // ── Dark mode ──────────────────────────────────────────────────────────────
  function applyDark(on) {
    document.documentElement.setAttribute("data-theme", on ? "dark" : "light");
    document.getElementById("darkIcon").style.display  = on ? "none" : "";
    document.getElementById("lightIcon").style.display = on ? "" : "none";
    if (epubRendition) {
      epubRendition.themes.select(on ? "dark" : "light");
    }
  }
  applyDark(darkMode);

  document.getElementById("darkModeBtn").addEventListener("click", () => {
    darkMode = !darkMode;
    localStorage.setItem("reader_dark", darkMode ? "1" : "0");
    applyDark(darkMode);
  });

  // ── Auth ───────────────────────────────────────────────────────────────────
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;
    parseParams();
    if (!fileId) return;
    elFileTitle.textContent = fileName || "Loading…";
    document.title = (fileName || "Reader") + " – FileAccess";
    try {
      await fetchSignedUrl();
    } catch {
      return; // error already shown by fetchSignedUrl
    }
    initReader();
  });

  // ── Fetch signed URL (with timeout + wake-up hint) ───────────────────────
  async function fetchSignedUrl() {
    // Show a friendlier message after 4 s in case the Render server is cold-starting
    const wakeTimer = setTimeout(() => {
      elLoading.innerHTML = `
        <div class="spinner"></div>
        <p>Server is waking up — this can take up to 30 s on first load…</p>
        <p style="font-size:0.8rem;color:var(--muted);margin-top:0.25rem;">Please wait.</p>
      `;
    }, 4000);

    try {
      const idToken = await currentUser.getIdToken();

      // 60-second hard timeout
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 60000);

      let resp;
      try {
        resp = await fetch(
          `${ECPAY_SERVER_URL}/files/signed-url?fileId=${encodeURIComponent(fileId)}`,
          { headers: { "Authorization": `Bearer ${idToken}` }, signal: controller.signal }
        );
      } finally {
        clearTimeout(timer);
      }

      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        throw new Error(body.error || `Server error ${resp.status}`);
      }
      ({ signedUrl } = await resp.json());
    } catch (err) {
      const msg = err.name === "AbortError"
        ? "Request timed out. The server may be unavailable — please try again."
        : err.message;
      showError(`Cannot load file: ${escHtml(msg)} &nbsp;<a href="index.html">← Back</a>`);
      throw err;
    } finally {
      clearTimeout(wakeTimer);
    }
  }

  // ── Route to correct reader ────────────────────────────────────────────────
  function initReader() {
    const ext = fileName?.split(".").pop()?.toLowerCase();
    const isEpub = fileType === "application/epub+zip" || ext === "epub";
    const isPdf  = fileType === "application/pdf"      || ext === "pdf";

    if (isPdf) {
      readerMode = "pdf";
      elPdfControls.style.display  = "flex";
      elEpubControls.style.display = "none";
      loadPdf();
    } else if (isEpub) {
      readerMode = "epub";
      elPdfControls.style.display  = "none";
      elEpubControls.style.display = "flex";
      // Sidebar open by default for EPUB
      elSidebar.classList.remove("collapsed");
      loadEpub();
    } else {
      showError(`Unsupported type: "${escHtml(fileType)}" / ext: "${escHtml(fileName?.split(".").pop())}" — <a href='index.html'>Go back</a>`);
    }
  }

  // ════════════════════════════════════════════════════════════════════════════
  // PDF READER
  // ════════════════════════════════════════════════════════════════════════════
  async function loadPdf() {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    try {
      pdfDoc = await pdfjsLib.getDocument({ url: signedUrl, withCredentials: false }).promise;
      pdfTotal = pdfDoc.numPages;

      // Restore saved progress
      const saved = parseInt(localStorage.getItem(PROGRESS_KEY(fileId)) || "1", 10);
      pdfPage = Math.min(Math.max(saved, 1), pdfTotal);

      elPdfContainer.classList.remove("hidden");
      elLoading.classList.add("hidden");

      updatePageInfo();
      await renderCurrentPage();
      showKbHint();
    } catch (err) {
      showError(`Failed to load PDF: ${escHtml(err.message)}`);
    }
  }

  async function renderCurrentPage() {
    if (pdfRendering) {
      renderQueue = pdfPage;
      return;
    }
    pdfRendering = true;

    // Clear existing canvases
    elPdfContainer.innerHTML = "";

    try {
      const page = await pdfDoc.getPage(pdfPage);

      // Fit width to container, then apply zoom
      const containerW = elPdfContainer.clientWidth - 32; // 16px padding each side
      const viewport0  = page.getViewport({ scale: 1 });
      const baseScale  = Math.min(containerW / viewport0.width, 1.6); // never exceed 1.6× for baseline
      const scale      = baseScale * pdfZoom;
      const viewport   = page.getViewport({ scale });

      const wrap   = document.createElement("div");
      wrap.className = "pdf-page-wrap";
      wrap.style.width  = viewport.width  + "px";
      wrap.style.height = viewport.height + "px";

      const canvas  = document.createElement("canvas");
      const context = canvas.getContext("2d");
      canvas.width  = viewport.width;
      canvas.height = viewport.height;

      wrap.appendChild(canvas);
      elPdfContainer.appendChild(wrap);

      await page.render({ canvasContext: context, viewport }).promise;

      // Save progress
      localStorage.setItem(PROGRESS_KEY(fileId), pdfPage);

      // Update progress bar
      elProgress.style.width = ((pdfPage / pdfTotal) * 100) + "%";
    } catch (err) {
      console.error("Render error:", err);
    }

    pdfRendering = false;
    if (renderQueue !== null) {
      pdfPage      = renderQueue;
      renderQueue  = null;
      updatePageInfo();
      await renderCurrentPage();
    }
  }

  function updatePageInfo() {
    elPageInfo.textContent     = `${pdfPage} / ${pdfTotal}`;
    elZoomDisplay.textContent  = Math.round(pdfZoom * 100) + "%";
    document.getElementById("prevPage").disabled = pdfPage <= 1;
    document.getElementById("nextPage").disabled = pdfPage >= pdfTotal;
  }

  async function goToPage(n) {
    n = Math.min(Math.max(n, 1), pdfTotal);
    if (n === pdfPage) return;
    pdfPage = n;
    updatePageInfo();
    await renderCurrentPage();
    elPdfContainer.scrollTop = 0;
  }

  function changeZoom(delta) {
    const newZoom = Math.min(Math.max(pdfZoom + delta, ZOOM_MIN), ZOOM_MAX);
    if (newZoom === pdfZoom) return;
    pdfZoom = newZoom;
    elZoomDisplay.textContent = Math.round(pdfZoom * 100) + "%";
    renderCurrentPage();
  }

  document.getElementById("prevPage").addEventListener("click", () => goToPage(pdfPage - 1));
  document.getElementById("nextPage").addEventListener("click", () => goToPage(pdfPage + 1));
  document.getElementById("zoomIn").addEventListener("click",  () => changeZoom(+ZOOM_STEP));
  document.getElementById("zoomOut").addEventListener("click", () => changeZoom(-ZOOM_STEP));

  // ════════════════════════════════════════════════════════════════════════════
  // EPUB READER
  // ════════════════════════════════════════════════════════════════════════════
  async function loadEpub() {
    try {
      epubBook = ePub(signedUrl);

      // Create rendition that fills the container (excluding arrows)
      epubRendition = epubBook.renderTo("epubContainer", {
        width:  "100%",
        height: "100%",
        flow:   "paginated",
        spread: "none",
      });

      // Apply themes
      epubRendition.themes.register("light", {
        "body": { "background": "#FFFFFF", "color": "#0F172A", "font-family": "Inter, system-ui, sans-serif", "font-size": "1rem", "line-height": "1.7" }
      });
      epubRendition.themes.register("dark", {
        "body": { "background": "#1E293B", "color": "#F1F5F9", "font-family": "Inter, system-ui, sans-serif", "font-size": "1rem", "line-height": "1.7" }
      });
      epubRendition.themes.select(darkMode ? "dark" : "light");

      // Restore saved CFI
      const savedCfi = localStorage.getItem(PROGRESS_KEY(fileId));

      // Display
      await epubRendition.display(savedCfi || undefined);

      // Build TOC
      await epubBook.ready;
      const nav = await epubBook.navigation.loaded;
      buildToc(epubBook.navigation.toc);

      elEpubContainer.classList.remove("hidden");
      elLoading.classList.add("hidden");

      // Track location changes for progress + TOC highlight
      epubRendition.on("relocated", (location) => {
        if (!location) return;
        // Save progress
        localStorage.setItem(PROGRESS_KEY(fileId), location.start.cfi);
        // Update progress bar
        if (epubBook.locations && epubBook.locations.length()) {
          const pct = epubBook.locations.percentageFromCfi(location.start.cfi);
          elProgress.style.width = (pct * 100) + "%";
        }
        // Highlight active TOC item
        highlightTocByCfi(location.start.cfi);
      });

      showKbHint();
    } catch (err) {
      showError(`Failed to load EPUB: ${escHtml(err.message)}`);
    }
  }

  function buildToc(items, depth = 0) {
    if (!items || !items.length) return;
    items.forEach((item, i) => {
      const btn = document.createElement("button");
      btn.className = "toc-item" + (depth === 1 ? " sub" : depth >= 2 ? " sub2" : "");
      btn.textContent = item.label?.trim() || `Chapter ${i + 1}`;
      btn.dataset.href = item.href || "";
      btn.addEventListener("click", () => {
        epubRendition.display(item.href).catch(console.error);
        // On small screens, collapse sidebar after selection
        if (window.innerWidth < 640) elSidebar.classList.add("collapsed");
      });
      elTocList.appendChild(btn);
      tocItems.push({ btn, href: item.href || "" });
      if (item.subitems?.length) buildToc(item.subitems, depth + 1);
    });
  }

  function highlightTocByCfi(cfi) {
    // Simple approach: find last TOC href whose CFI is before current
    // epub.js provides book.spine which we can use
    try {
      const spineItem = epubBook.spine.get(cfi);
      if (!spineItem) return;
      const href = spineItem.href;
      tocItems.forEach(({ btn, href: h }) => {
        const match = h && (h === href || href.includes(h.split("#")[0]));
        btn.classList.toggle("active", match);
        if (match) {
          btn.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      });
    } catch (_) {}
  }

  document.getElementById("epubPrev").addEventListener("click", () => epubRendition?.prev());
  document.getElementById("epubNext").addEventListener("click", () => epubRendition?.next());

  document.getElementById("epubTocToggle").addEventListener("click", () => {
    elSidebar.classList.toggle("collapsed");
  });

  // ── Keyboard navigation ────────────────────────────────────────────────────
  document.addEventListener("keydown", (e) => {
    // Don't intercept if already blocked by protect.js
    if (e.defaultPrevented) return;

    if (readerMode === "pdf") {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") goToPage(pdfPage + 1);
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   goToPage(pdfPage - 1);
      if (e.key === "+" || e.key === "=") changeZoom(+ZOOM_STEP);
      if (e.key === "-")                  changeZoom(-ZOOM_STEP);
    }
    if (readerMode === "epub") {
      if (e.key === "ArrowRight") epubRendition?.next();
      if (e.key === "ArrowLeft")  epubRendition?.prev();
    }
  });

  // ── Window resize: re-render PDF ──────────────────────────────────────────
  let resizeTimer;
  window.addEventListener("resize", () => {
    if (readerMode !== "pdf") return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => renderCurrentPage(), 250);
  });

  // ── Keyboard hint bubble ───────────────────────────────────────────────────
  let hintTimer;
  function showKbHint() {
    elKbHint.classList.add("visible");
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => elKbHint.classList.remove("visible"), 3000);
  }

  // ── Utility ───────────────────────────────────────────────────────────────
  function showError(html) {
    elLoading.innerHTML = `
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p style="color:#EF4444;font-weight:500;">${html}</p>
    `;
    elLoading.classList.remove("hidden");
  }

  function escHtml(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
