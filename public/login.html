<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – FileAccess</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/protect.js"></script>
  <script src="js/i18n.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

  <div style="position:absolute;top:1rem;right:1.25rem;" id="langToggleWrap"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="8" fill="#2563EB"/>
        <path d="M10 10h10l6 6v10H10V10z" fill="white" opacity="0.9"/>
        <rect x="14" y="18" width="8" height="1.5" rx="0.75" fill="#2563EB"/>
        <rect x="14" y="21" width="6" height="1.5" rx="0.75" fill="#2563EB"/>
        <circle cx="23" cy="13" r="4" fill="#BFDBFE" stroke="#2563EB" stroke-width="1.5"/>
        <path d="M21.5 13l1 1 2-2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="auth-logo-text">FileAccess</span>
    </div>

    <h1 class="auth-title" data-i18n="login_title">Welcome back</h1>
    <p class="auth-subtitle" data-i18n="login_subtitle">Sign in to access your files</p>

    <!-- Error / Info Banner -->
    <div id="authError" class="alert alert-error hidden"></div>

    <!-- Redirect sign-in loading state (shown while getRedirectResult resolves on Safari) -->
    <div id="redirectLoading" class="hidden" style="text-align:center;padding:1.5rem 0;">
      <div class="spinner" style="margin:0 auto 0.75rem;"></div>
      <p style="color:var(--color-text-muted);font-size:0.9rem;" data-i18n="login_completingSignIn">Completing sign-in…</p>
    </div>

    <!-- Email / Password Form -->
    <form id="emailForm" class="auth-form">
      <div class="form-group">
        <label for="email" data-i18n="login_email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" data-i18n-placeholder="login_emailPlaceholder" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password" data-i18n="login_password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="••••••••" data-i18n-placeholder="login_passwordPlaceholder" required autocomplete="current-password"/>
          <button type="button" class="pw-toggle" data-i18n="login_show" onclick="togglePw()">Show</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="emailBtn">
        <span class="btn-label" data-i18n="login_signInBtn">Sign in</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>

    <div class="divider"><span data-i18n="login_or">or continue with</span></div>

    <!-- Social Providers -->
    <div class="social-grid">
      <button class="btn btn-social btn-full" id="googleBtn" onclick="signInGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18"/>
        <span data-i18n="login_google">Continue with Google</span>
      </button>
    </div>

    <p class="auth-footer"><span data-i18n="login_noAccount">Don't have an account?</span> <a href="register.html" data-i18n="login_createOne">Create one</a></p>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult,
      browserLocalPersistence,
      setPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { firebaseConfig } from "./js/config.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    // Write/update user profile on every sign-in (non-destructive update)
    async function saveUserProfile(user) {
      try {
        const updates = {
          email:       user.email || "",
          displayName: user.displayName || "",
          lastLoginAt: Date.now(),
        };
        await update(ref(db, `users/${user.uid}`), updates);
      } catch (e) {
        console.warn("saveUserProfile failed:", e);
      }
    }

    // ── Helpers (defined synchronously so they're available immediately) ────────
    function showError(msg) {
      const el = document.getElementById("authError");
      el.textContent = msg;
      el.classList.remove("hidden");
    }
    function clearError() {
      document.getElementById("authError").classList.add("hidden");
    }
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.querySelector(".btn-label")?.classList.toggle("hidden", loading);
      btn.querySelector(".btn-spinner")?.classList.toggle("hidden", !loading);
      btn.disabled = loading;
    }
    function friendlyError(code) {
      const map = {
        "auth/user-not-found": t("err_userNotFound"),
        "auth/wrong-password": t("err_wrongPassword"),
        "auth/invalid-email": t("err_invalidEmail"),
        "auth/too-many-requests": t("err_tooManyRequests"),
        "auth/account-exists-with-different-credential": t("err_accountExistsDifferentCred"),
        "auth/invalid-credential": t("err_invalidCredential"),
      };
      return map[code] || t("err_signInFailed");
    }

    // ── Event listeners (wired up synchronously) ─────────────────────────────
    // Email/Password
    document.getElementById("emailForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      setLoading("emailBtn", true);
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        saveUserProfile(cred.user); // fire-and-forget — don't block redirect
        window.location.href = "index.html";
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading("emailBtn", false);
      }
    });

    // Google — use popup first, fall back to redirect for Safari
    window.signInGoogle = async () => {
      clearError();
      const provider = new GoogleAuthProvider();
      // Safari blocks popups from non-user-gesture contexts; try popup first,
      // then silently fall back to redirect flow
      try {
        const googleCred = await signInWithPopup(auth, provider);
        await saveUserProfile(googleCred.user);
        window.location.href = "index.html";
      } catch (err) {
        if (err.code === "auth/popup-blocked" ||
            err.code === "auth/popup-closed-by-user" ||
            err.code === "auth/cancelled-popup-request") {
          // Redirect flow (Safari-safe)
          try {
            await signInWithRedirect(auth, provider);
            // Page will redirect to Google, then back to login.html
            // getRedirectResult() at top of script handles the return
          } catch (e) {
            showError(friendlyError(e.code));
          }
        } else {
          showError(friendlyError(err.code));
        }
      }
    };

    window.togglePw = () => {
      const pw = document.getElementById("password");
      const btn = document.querySelector(".pw-toggle");
      if (pw.type === "password") { pw.type = "text"; btn.textContent = t("login_hide"); }
      else { pw.type = "password"; btn.textContent = t("login_show"); }
    };

    // Language toggle
    if (window.i18n) i18n.injectToggle(document.getElementById("langToggleWrap"));

    // ── Async init: persistence + redirect result ─────────────────────────────
    // Wrapped in an IIFE so top-level await isn't required (Safari 14 compat)
    (async () => {
      const redirectEl = document.getElementById("redirectLoading");
      const formEl     = document.getElementById("emailForm");
      const dividerEl  = document.querySelector(".divider");
      const socialEl   = document.querySelector(".social-grid");

      // Hide form while we set persistence + check redirect result
      redirectEl.classList.remove("hidden");
      formEl.classList.add("hidden");
      if (dividerEl) dividerEl.classList.add("hidden");
      if (socialEl)  socialEl.classList.add("hidden");

      // Force local persistence FIRST — must complete before any sign-in attempt
      // so the session survives navigation to index.html
      await setPersistence(auth, browserLocalPersistence);

      // Check for Google redirect result (Safari redirect flow)
      try {
        const result = await getRedirectResult(auth);
        if (result?.user) {
          await saveUserProfile(result.user);
          window.location.href = "index.html";
          return; // page is navigating, leave spinner visible
        }
      } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") showError(friendlyError(err.code));
      }

      // Persistence set and no redirect in progress — show the sign-in form
      redirectEl.classList.add("hidden");
      formEl.classList.remove("hidden");
      if (dividerEl) dividerEl.classList.remove("hidden");
      if (socialEl)  socialEl.classList.remove("hidden");
    })();
  </script>
</body>
</html>
