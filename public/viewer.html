<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Viewer – FileAccess</title>
  <script src="js/i18n.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --accent:    #2563eb;
      --accent2:   #3b82f6;
      --error:     #ef4444;
      --success:   #22c55e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1rem;
      z-index: 100;
    }

    #backBtn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.875rem;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    #backBtn:hover { color: var(--text); background: var(--border); }

    #fileTitle {
      font-size: 0.95rem;
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #pageInfo {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* PDF zoom controls */
    #pdfControls {
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    #pdfControls button {
      background: var(--border);
      border: none;
      color: var(--text);
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    #pdfControls button:hover { background: var(--accent); }
    #zoomLabel { font-size: 0.82rem; color: var(--muted); min-width: 3rem; text-align: center; }

    /* ── Main viewer area ────────────────────────────────────── */
    #viewerArea {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
    }

    /* ── Loading screen ──────────────────────────────────────── */
    #loadingScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      height: 100%;
      width: 100%;
      max-width: 440px;
      margin: auto;
    }

    #loadingIcon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    #loadingTitle {
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
    }

    /* Progress bar container */
    #progressWrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* Individual step */
    .progress-step {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }

    .step-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.8rem;
      transition: all 0.3s ease;
      color: var(--muted);
    }
    .step-icon.active {
      border-color: var(--accent2);
      background: rgba(59,130,246,0.12);
      color: var(--accent2);
    }
    .step-icon.done {
      border-color: var(--success);
      background: rgba(34,197,94,0.12);
      color: var(--success);
    }
    .step-icon.error {
      border-color: var(--error);
      background: rgba(239,68,68,0.12);
      color: var(--error);
    }

    /* Spinning ring for active step */
    .step-spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(59,130,246,0.25);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .step-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .step-label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: color 0.2s;
    }
    .step-sublabel {
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1em;
      transition: all 0.2s;
    }
    .progress-step.pending .step-label { color: var(--muted); }

    /* Bar track between steps */
    .step-track {
      margin-left: 15px;
      width: 2px;
      height: 18px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .step-track .fill {
      width: 100%;
      height: 0%;
      background: var(--accent2);
      border-radius: 2px;
      transition: height 0.4s ease;
    }
    .step-track.filled .fill { height: 100%; }

    /* Download progress sub-bar */
    #downloadBar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.3rem;
    }
    #downloadBarFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    /* ── Error state ─────────────────────────────────────────── */
    #errorBox {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      text-align: center;
      max-width: 520px;
      margin: auto;
    }
    #errorBox.visible { display: flex; }
    #errorTitle { font-size: 1rem; font-weight: 600; color: var(--error); }
    #errorDetail {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      width: 100%;
      text-align: left;
      white-space: pre-wrap;
    }
    #errorBackBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1.4rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
    }
    #errorBackBtn:hover { background: var(--accent2); }

    /* ── PDF canvas pages ────────────────────────────────────── */
    .pdf-page-wrap {
      position: relative;
      margin-bottom: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border-radius: 4px;
      overflow: hidden;
      line-height: 0;
    }
    .pdf-page-wrap canvas { display: block; max-width: 100%; }

    .wm-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Image viewer ────────────────────────────────────────── */
    #imgWrap {
      position: relative;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
      line-height: 0;
    }
    #imgWrap img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }

    /* ── Toast notification ──────────────────────────────────── */
    #toastContainer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background: #1e293b;
      color: #f8fafc;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: toastIn 0.18s ease;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .toast.fade-out { animation: toastOut 0.18s ease forwards; }

    /* ── Print guard ─────────────────────────────────────────── */
    @media print {
      body::before {
        content: "Printing is not allowed.";
        display: block;
        font-size: 2rem;
        text-align: center;
        margin-top: 40vh;
        color: #000;
      }
      #topbar, #viewerArea { display: none !important; }
    }

    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes toastIn  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(8px); } }
  </style>
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────────── -->
<div id="topbar">
  <button id="backBtn" onclick="goBack()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    <span data-i18n="v_back">Back</span>
  </button>
  <span id="fileTitle">Loading…</span>
  <span id="pageInfo"></span>
  <div id="langToggleWrap" style="display:flex;align-items:center;"></div>
  <div id="pdfControls">
    <button onclick="zoomOut()" title="Zoom out" data-i18n-title="v_zoomOut">−</button>
    <span id="zoomLabel">100%</span>
    <button onclick="zoomIn()"  title="Zoom in" data-i18n-title="v_zoomIn">+</button>
    <button onclick="zoomReset()" title="Reset zoom" data-i18n-title="v_resetZoom" style="width:auto;padding:0 8px;font-size:0.75rem;" data-i18n="v_reset">Reset</button>
  </div>
</div>

<!-- ── Viewer area ───────────────────────────────────────────── -->
<div id="viewerArea">

  <!-- Loading screen with step-by-step progress -->
  <div id="loadingScreen">
    <div id="loadingIcon">📄</div>
    <div id="loadingTitle" data-i18n="v_openingFile">Opening file…</div>

    <div id="progressWrap">

      <!-- Step 1: Authenticate -->
      <div class="progress-step pending" id="step1">
        <div class="step-icon" id="step1Icon">1</div>
        <div class="step-text">
          <div class="step-label" data-i18n="v_step1Label">Authenticating</div>
          <div class="step-sublabel" id="step1Sub" data-i18n="v_step1Sub">Verifying your session…</div>
        </div>
      </div>
      <div class="step-track" id="track1"><div class="fill"></div></div>

      <!-- Step 2: Fetch signed URL -->
      <div class="progress-step pending" id="step2">
        <div class="step-icon" id="step2Icon">2</div>
        <div class="step-text">
          <div class="step-label" data-i18n="v_step2Label">Fetching secure link</div>
          <div class="step-sublabel" id="step2Sub" data-i18n="v_step2Sub">Requesting access from server…</div>
        </div>
      </div>
      <div class="step-track" id="track2"><div class="fill"></div></div>

      <!-- Step 3: Download -->
      <div class="progress-step pending" id="step3">
        <div class="step-icon" id="step3Icon">3</div>
        <div class="step-text">
          <div class="step-label" data-i18n="v_step3Label">Downloading file</div>
          <div class="step-sublabel" id="step3Sub" data-i18n="v_waiting">Waiting…</div>
          <div id="downloadBar" style="display:none;">
            <div id="downloadBarFill"></div>
          </div>
        </div>
      </div>
      <div class="step-track" id="track3"><div class="fill"></div></div>

      <!-- Step 4: Render -->
      <div class="progress-step pending" id="step4">
        <div class="step-icon" id="step4Icon">4</div>
        <div class="step-text">
          <div class="step-label" data-i18n="v_step4Label">Rendering</div>
          <div class="step-sublabel" id="step4Sub" data-i18n="v_waiting">Waiting…</div>
        </div>
      </div>

    </div><!-- /progressWrap -->
  </div><!-- /loadingScreen -->

  <!-- Error state (hidden until needed) -->
  <div id="errorBox">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <div id="errorTitle" data-i18n="v_failedToLoad">Failed to load file</div>
    <pre id="errorDetail"></pre>
    <button id="errorBackBtn" onclick="goBack()" data-i18n="v_goBack">← Go back</button>
  </div>

</div><!-- /viewerArea -->

<!-- Toast container -->
<div id="toastContainer"></div>

<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { firebaseConfig, RENDER_SERVER_URL } from "./js/config.js";

// ── Constants ────────────────────────────────────────────────────────────────
const PDFJS_CDN    = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";
const PDFJS_WORKER = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

// ── Parse query params ───────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search);
const fileId    = params.get("fileId")  || "";
const fileName  = decodeURIComponent(params.get("name") || "File");
const fileType  = decodeURIComponent(params.get("type") || "");
const permanent = params.get("permanent") === "1"; // true = permanent access, no watermark

document.getElementById("fileTitle").textContent = fileName;

// Guess file icon from type
function fileIcon(type, name) {
  if (type === "application/pdf") return "📄";
  if (type.startsWith("image/"))  return "🖼️";
  if (type.startsWith("video/"))  return "🎬";
  if (type.startsWith("audio/"))  return "🎵";
  if (type.startsWith("text/"))   return "📝";
  return "📁";
}
document.getElementById("loadingIcon").textContent = fileIcon(fileType, fileName);

// ── Progress step helpers ────────────────────────────────────────────────────
function stepActive(n, subMsg) {
  const step = document.getElementById(`step${n}`);
  const icon = document.getElementById(`step${n}Icon`);
  const sub  = document.getElementById(`step${n}Sub`);
  step.classList.remove("pending");
  icon.classList.add("active");
  icon.innerHTML = `<div class="step-spinner"></div>`;
  if (subMsg !== undefined) sub.textContent = subMsg;
}

function stepDone(n, subMsg) {
  const step = document.getElementById(`step${n}`);
  const icon = document.getElementById(`step${n}Icon`);
  const sub  = document.getElementById(`step${n}Sub`);
  step.classList.remove("pending");
  icon.classList.remove("active");
  icon.classList.add("done");
  icon.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
  if (subMsg !== undefined) sub.textContent = subMsg;
  // Fill the track after this step
  const track = document.getElementById(`track${n}`);
  if (track) track.classList.add("filled");
}

function stepError(n, subMsg) {
  const icon = document.getElementById(`step${n}Icon`);
  const sub  = document.getElementById(`step${n}Sub`);
  icon.classList.remove("active");
  icon.classList.add("error");
  icon.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  if (subMsg !== undefined) sub.textContent = subMsg;
}

function setDownloadProgress(pct) {
  const bar  = document.getElementById("downloadBar");
  const fill = document.getElementById("downloadBarFill");
  bar.style.display = "block";
  fill.style.width  = `${Math.min(100, pct)}%`;
}

function hideLoading() {
  document.getElementById("loadingScreen").style.display = "none";
}

function showError(msg) {
  hideLoading();
  const box = document.getElementById("errorBox");
  document.getElementById("errorDetail").textContent = msg;
  box.classList.add("visible");
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg) {
  const container = document.getElementById("toastContainer");
  container.innerHTML = "";
  clearTimeout(_toastTimer);

  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" style="flex-shrink:0">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    ${escHtml(msg)}`;
  container.appendChild(toast);

  _toastTimer = setTimeout(() => {
    toast.classList.add("fade-out");
    setTimeout(() => { container.innerHTML = ""; }, 200);
  }, 2800);
}

// ── IndexedDB file cache ─────────────────────────────────────────────────────
const CACHE_DB_NAME    = "fileaccess-cache";
const CACHE_DB_VERSION = 1;
const CACHE_STORE      = "files";

function openCacheDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(CACHE_DB_NAME, CACHE_DB_VERSION);
    req.onupgradeneeded = e => e.target.result.createObjectStore(CACHE_STORE, { keyPath: "fileId" });
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function getCachedBlob(fileId) {
  try {
    const db = await openCacheDB();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(CACHE_STORE, "readonly");
      const req = tx.objectStore(CACHE_STORE).get(fileId);
      req.onsuccess = e => resolve(e.target.result?.blob || null);
      req.onerror   = e => reject(e.target.error);
    });
  } catch { return null; }
}

async function setCachedBlob(fileId, blob) {
  try {
    const db = await openCacheDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(CACHE_STORE, "readwrite");
      tx.objectStore(CACHE_STORE).put({ fileId, blob, cachedAt: Date.now() });
      tx.oncomplete = resolve;
      tx.onerror    = e => reject(e.target.error);
    });
  } catch {}
}

const cacheConsent = localStorage.getItem("cacheConsent") === "true";

// ── Firebase auth ────────────────────────────────────────────────────────────
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

stepActive(1, t("v_checkingLogin"));

onAuthStateChanged(auth, async user => {
  if (!user) {
    stepError(1, t("v_notLoggedIn"));
    setTimeout(() => { window.location.href = "login.html"; }, 800);
    return;
  }
  if (!fileId) {
    stepError(1, t("v_noFileSpecified"));
    showError(t("v_noFileIdMsg"));
    return;
  }
  stepDone(1, `${t("v_signedInAs")} ${user.email || user.displayName}`);
  await loadFile(user);
});

// Language toggle
if (window.i18n) i18n.injectToggle(document.getElementById("langToggleWrap"));

// ── Main load flow ────────────────────────────────────────────────────────────
async function loadFile(user) {

  // Step 2 — check cache first, otherwise get signed URL
  let blob = null;

  if (cacheConsent && fileId) {
    stepActive(2, t("v_checkingCache"));
    blob = await getCachedBlob(fileId);
    if (blob) {
      stepDone(2, t("v_loadedFromCache"));
      stepDone(3, `${formatBytes(blob.size)} (${t("v_cached")})`);
    }
  }

  if (!blob) {
    stepActive(2, t("v_contactingServer"));
    let signedUrl;
    try {
      const idToken = await user.getIdToken(true);
      const resp = await fetch(
        `${RENDER_SERVER_URL}/files/signed-url?fileId=${encodeURIComponent(fileId)}`,
        { headers: { "Authorization": `Bearer ${idToken}` } }
      );
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        throw new Error(body.error || `Server error ${resp.status}`);
      }
      ({ signedUrl } = await resp.json());
      stepDone(2, t("v_secureLinkReceived"));
    } catch (err) {
      stepError(2, err.message);
      showError(`${t("v_couldNotGetLink")}\n${err.message}`);
      return;
    }

    // Step 3 — download file with progress tracking
    stepActive(3, t("v_connectingToStorage"));
    try {
      const dlController = new AbortController();

      // Stall detector: abort only if no data arrives for 30 seconds
      // (replaces fixed 60s timeout which kills large-file downloads)
      const STALL_MS = 30_000;
      let stallTimer = setTimeout(() => dlController.abort(), STALL_MS);
      const resetStall = () => {
        clearTimeout(stallTimer);
        stallTimer = setTimeout(() => dlController.abort(), STALL_MS);
      };

      let resp;
      try {
        resp = await fetch(signedUrl, { signal: dlController.signal });
        resetStall();
      } catch (fetchErr) {
        clearTimeout(stallTimer);
        if (fetchErr.name === "AbortError") throw new Error(t("v_downloadStalled"));
        throw fetchErr;
      }
      if (!resp.ok) { clearTimeout(stallTimer); throw new Error(`Storage error ${resp.status}`); }

      const contentLength = Number(resp.headers.get("Content-Length") || 0);

      try {
        if (contentLength > 0 && resp.body) {
          const reader = resp.body.getReader();
          const chunks = [];
          let received = 0;
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            resetStall(); // got data — reset stall timer
            chunks.push(value);
            received += value.length;
            setDownloadProgress((received / contentLength) * 100);
            document.getElementById("step3Sub").textContent =
              `${formatBytes(received)} / ${formatBytes(contentLength)}`;
          }
          const allChunks = new Uint8Array(received);
          let offset = 0;
          for (const chunk of chunks) { allChunks.set(chunk, offset); offset += chunk.length; }
          blob = new Blob([allChunks]);
        } else {
          animateIndeterminate();
          try {
            blob = await resp.blob();
          } finally {
            if (_indTimer) { clearInterval(_indTimer); _indTimer = null; }
          }
        }
      } finally {
        clearTimeout(stallTimer);
      }

      setDownloadProgress(100);
      stepDone(3, `${formatBytes(blob.size)} ${t("v_downloaded")}`);

      // Save to cache if user consented
      if (cacheConsent && fileId) {
        setCachedBlob(fileId, blob); // fire-and-forget
      }
    } catch (err) {
      stepError(3, err.message);
      showError(`${t("v_couldNotDownload")}\n${err.message}`);
      return;
    }
  }

  // Step 4 — render
  stepActive(4, t("v_preparingViewer"));
  const type = fileType || blob.type;

  try {
    if (type === "application/pdf") {
      document.getElementById("pdfControls").style.display = "flex";
      await renderPdf(blob, permanent ? "" : (user.email || user.displayName || ""));
    } else if (type.startsWith("image/")) {
      renderImage(blob, permanent ? "" : (user.email || user.displayName || ""));
    } else if (type.startsWith("video/")) {
      renderVideo(blob);
    } else if (type.startsWith("audio/")) {
      renderAudio(blob, fileName);
    } else if (type.startsWith("text/")) {
      await renderText(blob);
    } else {
      throw new Error(`${t("v_cannotPreview")} (${type || "unknown"}).\n${t("v_askAdminFormat")}`);
    }
  } catch (err) {
    stepError(4, err.message.split("\n")[0]);
    showError(err.message);
    return;
  }

  stepDone(4, t("v_ready"));
  hideLoading();
  document.title = `${fileName} – FileAccess`;
}

// ── Indeterminate bar animation ───────────────────────────────────────────────
let _indTimer = null;
function animateIndeterminate() {
  const fill = document.getElementById("downloadBarFill");
  document.getElementById("downloadBar").style.display = "block";
  let pct = 0;
  _indTimer = setInterval(() => {
    pct = pct >= 90 ? 90 : pct + 1.5;
    fill.style.width = pct + "%";
  }, 120);
}

// ── PDF renderer ─────────────────────────────────────────────────────────────
let pdfDoc   = null;
let pdfScale = 1.5;
let pdfArea  = null;
let wmEmail  = "";

async function renderPdf(blob, email) {
  wmEmail = email;
  const area = ensureContentArea();
  pdfArea = area;

  document.getElementById("step4Sub").textContent = t("v_loadingPdfEngine");

  let pdfjsLib;
  try {
    pdfjsLib = await import(PDFJS_CDN);
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
  } catch (err) {
    throw new Error(`Could not load PDF engine: ${err.message}`);
  }

  document.getElementById("step4Sub").textContent = t("v_parsingDocument");
  const arrayBuffer = await blob.arrayBuffer();
  try {
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  } catch (err) {
    throw new Error(`Could not parse PDF: ${err.message}`);
  }

  const total = pdfDoc.numPages;
  document.getElementById("pageInfo").textContent = i18n.getLang() === "zh" ? `共 ${total} ${t("v_pages")}` : `${total} page${total !== 1 ? "s" : ""}`;
  document.getElementById("step4Sub").textContent = `${t("v_rendering")} ${total} ${t("v_pages")}…`;

  for (let i = 1; i <= total; i++) {
    await renderPdfPage(pdfjsLib, pdfDoc, i, area, email);
    document.getElementById("step4Sub").textContent = `${t("v_pageOf")} ${i} / ${total}`;
  }
}

async function renderPdfPage(pdfjsLib, doc, pageNum, area, email) {
  const page     = await doc.getPage(pageNum);
  const viewport = page.getViewport({ scale: pdfScale });

  const wrap   = document.createElement("div");
  wrap.className = "pdf-page-wrap";
  wrap.dataset.page = pageNum;

  const canvas  = document.createElement("canvas");
  canvas.width  = viewport.width;
  canvas.height = viewport.height;

  wrap.appendChild(canvas);
  area.appendChild(wrap);

  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  applyWatermark(wrap, canvas.width, canvas.height, email);
}

// ── Zoom controls ─────────────────────────────────────────────────────────────
window.zoomIn    = () => setZoom(pdfScale + 0.25);
window.zoomOut   = () => setZoom(Math.max(0.5, pdfScale - 0.25));
window.zoomReset = () => setZoom(1.5);

async function setZoom(scale) {
  if (!pdfDoc || !pdfArea) return;
  pdfScale = scale;
  document.getElementById("zoomLabel").textContent = Math.round(scale * 100 / 1.5 * 100) + "%";
  const { default: pdfjsLib } = await import(PDFJS_CDN).catch(() => ({}));
  if (!pdfjsLib) return;
  pdfArea.innerHTML = "";
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    await renderPdfPage(pdfjsLib, pdfDoc, i, pdfArea, wmEmail);
  }
}

// ── Image renderer ────────────────────────────────────────────────────────────
function renderImage(blob, email) {
  const area = ensureContentArea();
  const url  = URL.createObjectURL(blob);
  const wrap = document.createElement("div");
  wrap.id = "imgWrap";

  const img = document.createElement("img");
  img.src = url;
  img.alt = fileName;
  img.draggable = false;
  img.onload = () => {
    applyWatermark(wrap, wrap.offsetWidth, wrap.offsetHeight, email);
    URL.revokeObjectURL(url);
  };

  wrap.appendChild(img);
  area.appendChild(wrap);
}

// ── Video renderer ────────────────────────────────────────────────────────────
function renderVideo(blob) {
  const area  = ensureContentArea();
  const url   = URL.createObjectURL(blob);
  const video = document.createElement("video");
  video.src                   = url;
  video.controls              = true;
  video.controlsList          = "nodownload nofullscreen";
  video.disablePictureInPicture = true;
  video.style.cssText = "max-width:min(900px,100%);max-height:calc(100vh - 100px);border-radius:8px;display:block;box-shadow:0 4px 24px rgba(0,0,0,0.5);";
  video.onended = () => URL.revokeObjectURL(url);
  area.appendChild(video);
}

// ── Audio renderer ────────────────────────────────────────────────────────────
function renderAudio(blob, name) {
  const area  = ensureContentArea();
  const url   = URL.createObjectURL(blob);
  const wrap  = document.createElement("div");
  wrap.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:4rem 2rem;";
  wrap.innerHTML = `<div style="font-size:5rem">🎵</div><p style="font-size:1.1rem;font-weight:500">${escHtml(name)}</p>`;
  const audio = document.createElement("audio");
  audio.src          = url;
  audio.controls     = true;
  audio.controlsList = "nodownload";
  audio.onended      = () => URL.revokeObjectURL(url);
  wrap.appendChild(audio);
  area.appendChild(wrap);
}

// ── Text renderer ─────────────────────────────────────────────────────────────
async function renderText(blob) {
  const area = ensureContentArea();
  const text = await blob.text();
  const pre  = document.createElement("pre");
  pre.style.cssText = "background:var(--surface);padding:1.5rem;border-radius:8px;font-size:0.85rem;line-height:1.6;max-width:860px;width:100%;white-space:pre-wrap;word-break:break-word;color:var(--text);";
  pre.textContent = text;
  area.appendChild(pre);
}

// ── Content area helper ───────────────────────────────────────────────────────
function ensureContentArea() {
  let el = document.getElementById("contentArea");
  if (!el) {
    el = document.createElement("div");
    el.id = "contentArea";
    el.style.cssText = "display:flex;flex-direction:column;align-items:center;width:100%;";
    document.getElementById("viewerArea").appendChild(el);
  }
  return el;
}

// ── Watermark ─────────────────────────────────────────────────────────────────
function applyWatermark(container, w, h, email) {
  if (!email) return;
  const wm  = document.createElement("canvas");
  wm.className = "wm-canvas";
  wm.width  = w || 800;
  wm.height = h || 600;
  wm.style.opacity = "0.13";

  const ctx = wm.getContext("2d");
  ctx.font  = "bold 15px Inter, system-ui, sans-serif";
  ctx.fillStyle = "#ffffff";
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(-30 * Math.PI / 180);
  ctx.translate(-w / 2, -h / 2);

  const text  = `🔒 ${email}`;
  const stepX = 260;
  const stepY = 110;
  for (let y = -h; y < w + h; y += stepY) {
    for (let x = -w; x < w + h; x += stepX) {
      ctx.fillText(text, x, y);
    }
  }
  ctx.restore();

  container.style.position = "relative";
  container.appendChild(wm);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatBytes(b) {
  if (b < 1024)       return `${b} B`;
  if (b < 1048576)    return `${(b/1024).toFixed(1)} KB`;
  return `${(b/1048576).toFixed(1)} MB`;
}

function escHtml(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

window.goBack = () => history.length > 1 ? history.back() : (location.href = "index.html");

// ── PROTECTION LAYER ─────────────────────────────────────────────────────────

// 1. Block right-click
document.addEventListener("contextmenu", e => {
  e.preventDefault();
  e.stopPropagation();
  showToast(t("toast_rightClickDisabled"));
  return false;
});

// 2. Block keyboard shortcuts — devtools, print, save, view-source, copy, drag
document.addEventListener("keydown", e => {
  const ctrl = e.ctrlKey || e.metaKey;

  const rules = [
    { test: e.key === "F12",                                     msg: t("toast_devtoolsDisabled") },
    { test: ctrl && e.shiftKey && e.key === "I",                 msg: t("toast_devtoolsDisabled") },
    { test: ctrl && e.shiftKey && e.key === "J",                 msg: t("toast_devtoolsDisabled") },
    { test: ctrl && e.shiftKey && e.key === "C",                 msg: t("toast_devtoolsDisabled") },
    { test: ctrl && e.key === "p",                               msg: t("toast_printingNotAllowed") },
    { test: ctrl && e.key === "P",                               msg: t("toast_printingNotAllowed") },
    { test: ctrl && (e.key === "s" || e.key === "S"),            msg: t("toast_savingNotAllowed") },
    { test: ctrl && e.key === "u",                               msg: t("toast_viewSourceNotAllowed") },
    { test: ctrl && (e.key === "c" || e.key === "C"),            msg: t("toast_copyingNotAllowed") },
    { test: ctrl && (e.key === "a" || e.key === "A"),            msg: t("toast_selectAllNotAllowed") },
  ];

  for (const rule of rules) {
    if (rule.test) {
      e.preventDefault();
      e.stopPropagation();
      showToast(rule.msg);
      return false;
    }
  }
}, true);

// 3. Block drag-to-save
document.addEventListener("dragstart", e => {
  e.preventDefault();
  showToast(t("toast_dragNotAllowed"));
  return false;
});

// 4. Block text selection
document.addEventListener("selectstart", e => {
  e.preventDefault();
  return false;
});

// 5. Block print via system dialog
window.addEventListener("beforeprint", e => {
  document.body.style.visibility = "hidden";
  showToast(t("toast_printingNotAllowed"));
});
window.addEventListener("afterprint", () => {
  document.body.style.visibility = "";
});

// 6. Detect devtools open (size heuristic) and show warning overlay
(function devtoolsGuard() {
  const threshold = 160;
  let warned = false;
  setInterval(() => {
    const devOpen =
      (window.outerWidth  - window.innerWidth  > threshold) ||
      (window.outerHeight - window.innerHeight > threshold);
    if (devOpen && !warned) {
      warned = true;
      showToast(t("toast_devtoolsNotAllowed"));
    }
    if (!devOpen) warned = false;
  }, 1000);
})();

</script>
